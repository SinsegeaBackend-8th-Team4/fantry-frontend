name: Deploy Frontend to Prod Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    
    # [ ✨ 수정 ] 올바른 env 블록 문법을 사용합니다.
    env:
      # [ ✨ 수정 ] 스크립트가 기대하는 이름(BOOTPAY_APPLICATION_ID)으로 시크릿을 전달합니다.
      SECRET_BOOTPAY_APPLICATION_ID: ${{ secrets.BOOT_PAY_APP_ID }}
      SECRET_API_SERVER_URL: ${{ secrets.PROD_API_URL }}
      SECRET_FILE_BASE_URL: ${{ secrets.PROD_FILE_BASE_URL }}


    steps:
      - name: Execute frontend deployment script
        # [ ✨ 수정 ] 'prod' 환경에 맞는 스크립트를 실행합니다.
        run: ~/scripts/deploy-frontend-prod.sh
        # [ ✨ 수정 ] run 명령어에서는 with 블록을 사용하지 않으므로 삭제합니다.
